# SPDX-License-Identifier: Apache-2.0 OR MIT

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  dco:
    name: DCO compliance
    runs-on: ubuntu-latest
    steps:
      # do not run on tags, because our tag description may not carry a DCO
      # which causes this check to fail (and possibly among other reasons)
      - name: Skip for tags
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        run: exit 0

      - name: Run dco-check
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: christophebedard/dco-check@0.5.0
        with:
          python-version: "3.13"
          args: "--verbose"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  liyi-check:
    name: Liyi self-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p liyi-cli -- check --root .
