name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
          - target: aarch64-unknown-linux-musl
            arch: aarch64
          - target: loongarch64-unknown-linux-musl
            arch: loongarch64
          - target: riscv64gc-unknown-linux-musl
            arch: riscv64

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          elif [ "${{ matrix.arch }}" = "loongarch64" ]; then
            # Install loongarch64 cross toolchain
            curl -fsSL https://github.com/loongson/build-tools/releases/download/2024.11.01/x86_64-cross-tools-loongarch64-unknown-linux-gnu.tar.xz \
              | tar -xJf - -C /tmp
            echo "/tmp/cross-tools/bin" >> $GITHUB_PATH
          elif [ "${{ matrix.arch }}" = "riscv64" ]; then
            sudo apt-get install -y gcc-riscv64-linux-gnu libc6-dev-riscv64-cross
          fi

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Configure Cargo for cross-compilation
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-unknown-linux-musl]
          linker = "musl-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.loongarch64-unknown-linux-musl]
          linker = "loongarch64-unknown-linux-gnu-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]

          [target.riscv64gc-unknown-linux-musl]
          linker = "riscv64-linux-gnu-gcc"
          rustflags = ["-C", "target-feature=+crt-static"]
          EOF

      - name: Build release binary
        run: cargo build --release -p liyi --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            strip target/${{ matrix.target }}/release/liyi
          else
            ${{ matrix.arch }}-linux-gnu-strip target/${{ matrix.target }}/release/liyi || true
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/liyi dist/liyi-${{ matrix.target }}
          cp LICENSE-*.txt dist/
          cp README.md dist/
          cd dist
          tar czf ../liyi-${{ github.ref_name }}-${{ matrix.target }}.tar.gz liyi-${{ matrix.target }} LICENSE-*.txt README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liyi-${{ matrix.target }}
          path: liyi-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: liyi-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
