name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: x86_64
            cross: false
          - target: aarch64-unknown-linux-musl
            arch: aarch64
            cross: true
          - target: loongarch64-unknown-linux-musl
            arch: loongarch64
            cross: true
          - target: riscv64gc-unknown-linux-musl
            arch: riscv64
            cross: true

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install native musl tools
        if: ${{ !matrix.cross }}
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.cross
        # outdated -- v0.2.5 is from 2023 and doesn't support loongarch64 and
        # riscv64 musl targets
        # uses: taiki-e/install-action@cross
        run: |
          cargo install cross --git https://github.com/cross-rs/cross

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary (native)
        if: ${{ !matrix.cross }}
        run: |
          RUSTFLAGS='-C target-feature=+crt-static' \
            cargo build --release -p liyi --target ${{ matrix.target }}

      - name: Build release binary (cross)
        if: matrix.cross
        run: |
          cross build --release -p liyi --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          if [ "${{ matrix.cross }}" = "false" ]; then
            strip target/${{ matrix.target }}/release/liyi
          else
            # cross-compiled binaries may not be strippable by host strip
            ${{ matrix.arch }}-linux-musl-strip target/${{ matrix.target }}/release/liyi 2>/dev/null || true
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/liyi dist/
          cp LICENSE-*.txt dist/
          cp README.md dist/
          tar -C dist -czf ../liyi-${{ github.ref_name }}-${{ matrix.target }}.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: liyi-${{ matrix.target }}
          path: liyi-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: liyi-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
